spring:
  application:
    name: log-processor
  kafka:
    bootstrap-servers: localhost:9092
  datasource:
    url: jdbc:postgresql://localhost:5432/logagg
    username: admin
    password: admin123
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: none
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        # Hibernate batch insert settings
        # Without these, saveAll() still does individual INSERTs
        # With these, Hibernate groups them into batches of 100
        jdbc:
          batch_size: 100
        order_inserts: true   # group INSERT statements by entity type before batching
        order_updates: true   # same for UPDATEs
